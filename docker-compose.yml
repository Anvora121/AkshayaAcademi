version: '3.8'

# MongoDB is now hosted on Atlas — no local container needed.
# Set all secrets in backend/.env (never commit it).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: akshaya_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env          # loads MONGODB_URI, JWT_SECRET, etc. from file
    networks:
      - akshaya_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akshaya_frontend
    ports:
      - "5173:80"               # host:5173 → Nginx in container:80
    depends_on:
      - backend
    networks:
      - akshaya_network
    restart: unless-stopped

networks:
  akshaya_network:
    driver: bridge
