version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: akshaya_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - akshaya_network
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: akshaya_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/akshaya
      - JWT_SECRET=change_this_to_a_secure_random_string_in_production
      - FRONTEND_URL=http://localhost:5173
      - ADMIN_EMAILS=admin@test.com
    depends_on:
      - mongodb
    networks:
      - akshaya_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akshaya_frontend
    ports:
      - "5173:80" # Mapping 5173 on host to 80 (Nginx) in container
    depends_on:
      - backend
    networks:
      - akshaya_network
    restart: unless-stopped

networks:
  akshaya_network:
    driver: bridge

volumes:
  mongodb_data:
